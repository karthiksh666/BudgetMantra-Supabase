name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Backend: lint + test
  # ─────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: budget_mantra_test
      JWT_SECRET_KEY: test-secret-key
      CORS_ORIGINS: http://localhost:3000
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      REACT_APP_BACKEND_URL: http://localhost:8001

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install flake8 pytest pytest-asyncio httpx

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 server.py --max-line-length=120 --ignore=E501,W503,E302,W291,W293,E402

      - name: Start API server
        working-directory: backend
        run: uvicorn server:app --host 0.0.0.0 --port 8001 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8001/health && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # Frontend: install + build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CI: false
        run: npm run build
